{% extends 'base.html' %}

{% block title %}RAC - Home{% endblock %}

{% block content %}
{% if user.is_authenticated %}
    Hi {{ user.username }}!
    <button type="{% url 'logout' %}">Log Out</button>
    <p><a href="{% url 'caradd' %}">[Add new car]</a></p>
{% else %}
    <p><a href="{% url 'login' %}">Log In</a></p>
    <p><a href="{% url 'signup' %}">Sign Up</a></p>
{% endif %}
{% endblock %}
