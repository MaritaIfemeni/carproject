{% load static %}

<!DOCTYPES html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}RAC - Rent-a-car!{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'rentacar/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'rentacar/css/styles.css' %}">
    <script src="{% static 'rentacar/js/bootstrap.min.js' %}"></script>
</head>

<body>
<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="FrontPage">RAC</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav me-auto mb-2 mb-md-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="{% url 'home' %}">Home</a>
          </li>
          <li class="nav-item">
            {% if user.is_authenticated %}
            <a class="nav-link" href="logged">You are logged in as {{ user.username }}!</a>
            <a class="nav-link" href="{% url 'logout' %}"> Log out</a>
            {% else %}
            <a class="nav-link" href="{% url 'home' %}"> Log in</a>
            {% endif %}
           </li>
         <!-- <li class="nav-item">
            <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Disabled</a>
          </li> -->
        </ul>
        <!-- <form class="d-flex">
          <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
          <button class="btn btn-outline-success" type="submit">Search</button>
        </form> -->
      </div>
    </div>
  </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer mt-auto py-3 bg-light">
        <div class="container">
          <span class="text-muted">Footer</span>
        </div>
      </footer>

</body>
</html>
