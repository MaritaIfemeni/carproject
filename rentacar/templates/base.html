{% load static %}

<!DOCTYPES html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}RAC - Rent-a-car!{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'rentacar/css/bootstrap.min.css' %}">
    <script src="{% static 'rentacar/js/bootstrap.min.js' %}"></script>
</head>

<div class="topnav">
    <a class="active" href="#home">HOME</a>
    {% if user.is_authenticated %}
    <a href="#user" id="logged"> You are logged in as {{ user.username }}!</a>
    {% else %}
    <a href="{% url 'home' %}"> Log In </a>
    {% endif %}
</div>

<body>
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer mt-auto py-3 bg-light">
        <div class="container">
          <span class="text-muted">Footer</span>
        </div>
      </footer>

</body>
</html>
