{% load static %}

<!DOCTYPES html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}RAC - Rent-a-car!{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'rentacar/styles.css">
</head>

<body>
    <div class="topnav" id="topNavigation">
        <a href="#home" class="active">LOGO</a>
        {% if user.is_authenticated %}
        <a href="#user"> Kirjautuneena {{ user.username }}!</a>
        {% else %}
        <a href="#user"> Ei kirjautunutta käyttäjää!</a>
        {% endif %}
    </div>
    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
