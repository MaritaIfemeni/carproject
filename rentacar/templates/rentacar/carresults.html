{% extends 'base.html' %}

{% block content %}
{% if results %}
    {% for result in results %}
        {{ result.make }}
        {{ result.model }}
    {% endfor %}
{% else %}
    <h3 class='error'>Please enter a valid register number</h3>
    <form method="get" action="/search/">
        Enter register number: <input type="text" name="q" id="id_q" value="{{ query }}"/>
        <input type="submit" value="Search" />
    </form>
{% endif %}
{% endblock %}
