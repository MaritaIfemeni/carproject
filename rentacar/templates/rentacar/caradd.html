{% extends 'base.html' %}
{% block title %}Add Car {% endblock %}
{% block content %}

<div class="row mb-3">
    <div class="col-md-8 themed-grid-col">
      <div class="pb-3">
          <h5>Add a car you want to rent out!</h5>
      </div>
      <div class="row">
        <div class="col-md-6 themed-grid-col" id="caradd_firstcolum">
            <h5>New Car</h5>
            <form method="POST" id="carform">{% csrf_token %}
                <div class="form">
                    {{ carform.as_p }}
                </div>
                <button class="btn btn-outline-success" type="submit">Save</button>
            </form>
      </div>
      </div>
    </div>
      <img class="carpic" src="/media/images/audi.jpg" alt="Audi">
    </div>
  </div>
{% endblock %}
