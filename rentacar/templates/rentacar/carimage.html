{% extends 'base.html' %}

{% block content %}
<h2>Picture</h2>
    <form method="POST" enctype="multipart/form-data">{% csrf_token %}
        <div class="form">
            {{ form.as_p }}
        </div>
        <button type="submit" class="savebutton">upload</button>
    </form>

{% if img_obj %}
    <h2>Succesfully uploaded {{ img_obj.title }}</h2>
    <img src="{{ img_obj.image.url }}" alt="pic" style="max-height: 300px">
{% endif %}
{% endblock %}
