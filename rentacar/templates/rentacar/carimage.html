{% extends 'base.html' %}

{% block content %}
<h2>Picture</h2>

<h3>HERE: {{ selected_car }}</h3>

<select name="carsimage">
    {% for car in owner %}
        <option value="1">{{ car.car.registerNum }}</option>
    {% endfor %}
</select>

<form method="POST" enctype="multipart/form-data">{% csrf_token %}
    <div class="form">
        {{ form.as_p }}
    </div>
    <button type="submit" class="savebutton">upload</button>
</form>

{% if img_obj %}
    <h2>Succesfully uploaded {{ img_obj.title }}</h2>
    <img src="{{ img_obj.image.url }}" alt="pic" style="max-height: 300px">
{% endif %}

{% endblock %}
